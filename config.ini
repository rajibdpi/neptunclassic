[config]

logo.type = "file"
logo.options.label = "Site Logo"

show_nav_search.type = "checkbox"
show_nav_search.options.label = "Show navbar search"
show_nav_search.options.value = "1"

hero_title.type = "text"
hero_title.options.label = "Hero Title"
hero_title.options.value = "Digital Collections and Exhibitions"

hero_text.type = "textarea"
hero_text.options.label = "Hero Intro Text"
hero_text.options.value = "Explore manuscripts, photographs, reports, and curated exhibits through a clean research-friendly interface."

hero_badge.type = "text"
hero_badge.options.label = "Hero Badge"
hero_badge.options.value = "Digital Archive"

hero_image.type = "file"
hero_image.options.label = "Hero Image"

accent_color.type = "text"
accent_color.options.label = "Accent Color"
accent_color.options.value = "#1f4e79"

show_home_search.type = "checkbox"
show_home_search.options.label = "Show search box on homepage"
show_home_search.options.value = "1"

search_placeholder.type = "text"
search_placeholder.options.label = "Search Placeholder"
search_placeholder.options.value = "Search items, creators, subjects, dates..."

featured_items_count.type = "text"
featured_items_count.options.label = "Featured Items Count"
featured_items_count.options.value = "6"

featured_items_title.type = "text"
featured_items_title.options.label = "Featured Items Section Title"
featured_items_title.options.value = "Featured items"

featured_collections_count.type = "text"
featured_collections_count.options.label = "Featured Collections Count"
featured_collections_count.options.value = "4"

featured_collections_title.type = "text"
featured_collections_title.options.label = "Featured Collections Section Title"
featured_collections_title.options.value = "Curated sets"

show_collection_panel.type = "checkbox"
show_collection_panel.options.label = "Show collections panel on homepage"
show_collection_panel.options.value = "1"

footer_text.type = "textarea"
footer_text.options.label = "Footer Text"
footer_text.options.value = "Neptun Classic for Omeka Classic. IIIF-ready and research-friendly."
