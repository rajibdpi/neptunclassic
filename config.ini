[config]

logo.type = "file"
logo.options.label = "Site Logo"

hero_title.type = "text"
hero_title.options.label = "Hero Title"
hero_title.options.value = "Digital Collections & Exhibitions"

hero_text.type = "textarea"
hero_text.options.label = "Hero Intro Text"
hero_text.options.value = "Explore manuscripts, photographs, reports, and curated exhibits through a clean research-friendly interface."

hero_badge.type = "text"
hero_badge.options.label = "Hero Badge"
hero_badge.options.value = "Digital Archive"

